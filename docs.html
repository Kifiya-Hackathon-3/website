  <script>
    document.getElementById("y-docs").textContent = new Date().getFullYear();
    window.$docsify = {
      name: "Developer documentation",
      nameLink: "#/",
      themeColor: "#02404f",
      repo: "https://github.com/Kifiya-Hackathon-3",
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      routerMode: "hash",
      basePath: "docs/",
      homepage: "README.md",
      notFoundPage: true,
      search: {
        maxAge: 86400000,
        paths: "auto",
        placeholder: "Search docs",
        noData: "No results",
        depth: 3,
      },
      /* Only options passed to mermaid.run(); theme etc. go in mermaid.initialize() below */
      mermaidConfig: {

        suppressErrors: true,
      },
    };

  <!-- Mermaid + plugin MUST register before docsify.min.js reads $docsify.plugins -->

    if (typeof mermaid !== "undefined") {
      mermaid.initialize({

        theme: "neutral",
        securityLevel: "loose",
