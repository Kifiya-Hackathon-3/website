<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#02404F" />
  <meta name="description" content="Download the Kifiya digital identity wallet app." />
  <title>Download the app — Kifiya</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;1,400&family=Raleway:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header__inner">
        <a class="header__brand" href="./" aria-label="Kifiya — Digital Identity Wallet">
          <img
            class="header__logo"
            src="full_logo.svg"
            width="205"
            height="250"
            alt=""
            decoding="async"
          />
        </a>
      </div>
    </header>

    <main class="main">
      <section class="hero" aria-labelledby="hero-heading">
        <p class="eyebrow">Your data, your control</p>
        <h1 id="hero-heading" class="hero__title">Get the wallet on your phone</h1>
        <p class="hero__lede">
          Prove who you are, store credentials safely, and share only what each service needs—with privacy and control built in.
        </p>

        <div class="device-showcase">
          <div class="phone" aria-hidden="true">
            <div class="phone__bezel">
              <div class="phone__notch"></div>
              <div class="phone__screen">
                <div class="app-ui">
                  <div class="app-ui__status">
                    <span>9:41</span>
                    <span class="app-ui__icons">●●●</span>
                  </div>
                  <div class="app-ui__header">
                    <span class="app-ui__greeting">Wallet</span>
                  </div>
                  <div class="app-ui__card app-ui__card--id">
                    <span class="app-ui__chip"></span>
                    <div class="app-ui__card-text">
                      <span class="app-ui__label">Digital ID</span>
                      <span class="app-ui__sub">Ready to use</span>
                    </div>
                  </div>
                  <div class="app-ui__row">
                    <div class="app-ui__tile"></div>
                    <div class="app-ui__tile"></div>
                  </div>
                  <div class="app-ui__doc">
                    <span class="app-ui__doc-icon"></span>
                    <span>Documents</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="download-wrap">
          <a class="download-btn" href="#" rel="noopener">
            <span class="download-btn__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
              </svg>
            </span>
            Download the app
          </a>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>
        © <span id="y"></span> Kifiya ·
        <a class="footer__link" href="https://brand.kifiya.com/" rel="noopener noreferrer" target="_blank">Brand guidelines</a>
      </p>
    </footer>
  </div>
  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>
</body>
</html>
